<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Defend Your Weekend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
<style>
/* ─── Reset ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#1e1e1e;color:#fff;
  font-family:'Noto Sans',sans-serif;cursor:none;user-select:none;}

/* ─── Background Grid ────────────────────────────────────────────────── */
#bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(246,75,127,0.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(246,75,127,0.045) 1px,transparent 1px);
  background-size:48px 48px;}

/* ─── Custom Cursor ──────────────────────────────────────────────────── */
#cursor{position:fixed;width:96px;height:96px;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);}
#cursor .c-ring{position:absolute;inset:0;border:2px solid rgba(246,75,127,0.4);border-radius:50%;}
#cursor .c-h{position:absolute;top:50%;left:0;right:0;height:2px;background:#f64b7f;transform:translateY(-50%);}
#cursor .c-v{position:absolute;left:50%;top:0;bottom:0;width:2px;background:#f64b7f;transform:translateX(-50%);}
#cursor .c-dot{position:absolute;top:50%;left:50%;width:8px;height:8px;background:#f64b7f;
  border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 15px #f64b7f;}
#cursor .c-tl{position:absolute;top:0;left:0;width:16px;height:16px;border-top:2px solid #f64b7f;border-left:2px solid #f64b7f;}
#cursor .c-tr{position:absolute;top:0;right:0;width:16px;height:16px;border-top:2px solid #f64b7f;border-right:2px solid #f64b7f;}
#cursor .c-bl{position:absolute;bottom:0;left:0;width:16px;height:16px;border-bottom:2px solid #f64b7f;border-left:2px solid #f64b7f;}
#cursor .c-br{position:absolute;bottom:0;right:0;width:16px;height:16px;border-bottom:2px solid #f64b7f;border-right:2px solid #f64b7f;}

/* ─── Screens ────────────────────────────────────────────────────────── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:10;}
.screen.active{display:flex;}

/* ─── Badge ──────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:8px;
  border:1px solid #f64b7f;background:rgba(246,75,127,0.12);
  border-radius:9999px;padding:9px 30px;
  font-size:18px;font-weight:300;letter-spacing:2px;
  text-transform:uppercase;color:#fff;margin-bottom:32px;}
.badge-dot{width:8px;height:8px;background:#f64b7f;border-radius:50%;
  box-shadow:0 0 8px #f64b7f;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}

/* ─── Hero ───────────────────────────────────────────────────────────── */
.hero{text-align:center;margin-bottom:16px;}
.hero-white{font-size:clamp(50px,8vw,112px);font-weight:300;
  letter-spacing:6px;text-transform:uppercase;line-height:1.12;color:#fff;}
.hero-pink{font-size:clamp(50px,8vw,112px);font-weight:300;
  letter-spacing:6px;text-transform:uppercase;line-height:1.12;color:#f64b7f;
  text-shadow:0 0 60px rgba(246,75,127,0.3);}

/* ─── Subtitle ───────────────────────────────────────────────────────── */
.subtitle{text-align:center;font-size:clamp(13px,1.4vw,21px);font-weight:300;
  letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.8);
  line-height:1.9;max-width:640px;margin-bottom:40px;padding:0 16px;}
.subtitle strong{color:#f64b7f;font-weight:700;}

/* ─── Button ─────────────────────────────────────────────────────────── */
.btn-pink{background:#f64b7f;border:none;border-radius:9999px;
  padding:22px 80px;cursor:none;transition:background 0.2s;}
.btn-pink:hover{background:#e0336b;}
.btn-pink span{color:#fff;font-family:'Noto Sans',sans-serif;font-size:clamp(18px,1.8vw,28px);
  font-weight:700;letter-spacing:3px;text-transform:uppercase;}

/* ─── Play Screen ────────────────────────────────────────────────────── */
#screen-play{justify-content:flex-start;}
#game-area{position:fixed;inset:0;z-index:1;}

/* ─── Target Cards ───────────────────────────────────────────────────── */
.target-card{position:absolute;width:168px;pointer-events:none;z-index:10;}
.target-inner{background:rgba(255,255,255,0.08);border-radius:24px;
  padding:20px 24px;display:flex;flex-direction:column;align-items:center;
  gap:12px;position:relative;overflow:hidden;}
.target-glow{position:absolute;inset:0;border-radius:24px;
  border:1px solid rgba(246,75,127,0.5);
  box-shadow:0 0 15px 0 #f64b7f,0 4px 4px 0 rgba(0,0,0,0.25);pointer-events:none;}
.target-label{color:#fff;font-size:15px;font-weight:500;text-align:center;line-height:1.4;}
.target-icon{display:flex;align-items:center;justify-content:center;}

.target-card.hit{animation:tHit 0.35s ease-out forwards;}
@keyframes tHit{
  0%{transform:scale(1);opacity:1;}
  40%{transform:scale(1.3);opacity:1;filter:brightness(2.5);}
  100%{transform:scale(1.45);opacity:0;}}

.target-card.missed{animation:tMiss 0.6s ease-out forwards;}
@keyframes tMiss{
  0%{opacity:1;}
  100%{opacity:0;transform:translateY(28px);}}

/* ─── HUD ────────────────────────────────────────────────────────────── */
#hud-top-left{position:fixed;top:40px;left:48px;z-index:30;display:flex;flex-direction:column;gap:8px;}
#hud-top-right{position:fixed;top:40px;right:48px;z-index:30;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}

/* Hearts */
#hearts-row{display:flex;gap:10px;padding:6px 0;}
.heart-wrap{width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.heart-wrap.shake{animation:hShake 0.45s ease;}
@keyframes hShake{
  0%{transform:scale(1);}
  25%{transform:scale(1.4) rotate(-15deg);}
  50%{transform:scale(0.8) rotate(10deg);}
  75%{transform:scale(1.1);}
  100%{transform:scale(1);}}
.heart-svg{transform:scaleY(-1);transition:fill 0.2s;}

/* Timer box */
#timer-box{background:linear-gradient(to right,rgba(0,0,0,0.32),rgba(0,0,0,0.06));
  border-left:4px solid #f64b7f;padding:8px 18px;}
.hud-label{color:#f64b7f;font-size:14px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:2px;}
#timer-val{color:#fff;font-size:clamp(34px,4vw,60px);font-weight:800;line-height:1;}
#timer-val.danger{color:#ff4444;}

/* Combo box */
#combo-box{background:linear-gradient(to left,rgba(246,75,127,0.4),transparent);
  padding:6px 16px;display:none;}
#combo-box .hud-label{text-align:right;}
#combo-val{color:#fff;font-size:clamp(18px,2vw,26px);font-weight:700;text-align:right;}

/* Score box */
#score-box{background:linear-gradient(to left,rgba(0,0,0,0.32),rgba(0,0,0,0.06));
  border-right:4px solid #f64b7f;padding:8px 18px;}
#score-box .hud-label{text-align:right;}
#score-val{color:#fff;font-size:clamp(34px,4vw,60px);font-weight:800;text-align:right;line-height:1;}

/* ─── HUD Bottom ─────────────────────────────────────────────────────── */
#hud-bottom{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;flex-direction:column;}
#weekend-line{height:4px;
  background:linear-gradient(to right,transparent,#f64b7f 30%,#f64b7f 70%,transparent);
  opacity:0.85;box-shadow:0 0 20px 4px #ff0082;}
#weekend-line.pulse{animation:linePulse 0.6s ease-out;}
@keyframes linePulse{
  0%{opacity:0.85;box-shadow:0 0 20px 4px #ff0082;height:4px;}
  25%{opacity:1;box-shadow:0 0 90px 40px #ff0082,0 0 150px 70px rgba(246,75,127,0.5);height:6px;}
  60%{opacity:1;box-shadow:0 0 60px 25px #ff0082,0 0 110px 45px rgba(246,75,127,0.35);height:5px;}
  100%{opacity:0.85;box-shadow:0 0 20px 4px #ff0082;height:4px;}}

#weekend-bar{backdrop-filter:blur(12px);background:rgba(27,27,32,0.85);
  display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 0;}
.wk-arrow{width:14px;height:16px;}
#weekend-label{color:#fff;font-size:16px;font-weight:400;
  letter-spacing:5.6px;text-transform:uppercase;}

/* ─── Score Popup ────────────────────────────────────────────────────── */
.score-popup{position:fixed;pointer-events:none;z-index:50;
  font-weight:800;color:#f64b7f;text-shadow:0 0 10px #f64b7f;white-space:nowrap;
  animation:popUp 0.8s ease-out forwards;transform:translateX(-50%);}
@keyframes popUp{
  0%{opacity:1;transform:translateX(-50%) translateY(0);}
  60%{opacity:1;}
  100%{opacity:0;transform:translateX(-50%) translateY(-70px);}}

/* ─── Shot Ripple ────────────────────────────────────────────────────── */
.shot-ring{position:fixed;pointer-events:none;z-index:40;
  border:2px solid #f64b7f;border-radius:50%;
  animation:shotRipple 0.45s ease-out forwards;transform:translate(-50%,-50%);}
@keyframes shotRipple{
  0%{width:4px;height:4px;opacity:1;}
  100%{width:64px;height:64px;opacity:0;}}

/* ─── End Screen ─────────────────────────────────────────────────────── */
#end-subtitle{text-align:center;font-size:clamp(13px,1.3vw,20px);font-weight:300;
  letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.7);
  margin-bottom:36px;}

#end-stats{display:flex;align-items:flex-start;gap:4px;margin-bottom:44px;}
.stat-block{display:flex;flex-direction:column;padding:8px 18px;}
.stat-block.center{align-items:center;padding:8px 40px;
  border-top:4px solid #f64b7f;border-bottom:4px solid #f64b7f;}
.stat-block.right{align-items:flex-end;border-right:4px solid #f64b7f;}
.stat-divider{width:4px;background:#f64b7f;align-self:stretch;}
.stat-label{color:#f64b7f;font-size:15px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:4px;}
.stat-value{color:#fff;font-size:clamp(40px,5vw,80px);font-weight:800;line-height:1.1;}
.stat-label.right,.stat-value.right{text-align:right;}

#end-hearts-row{display:flex;gap:8px;margin-top:4px;}
.end-heart{width:52px;height:52px;display:flex;align-items:center;justify-content:center;}

/* ─── Screen transition ──────────────────────────────────────────────── */
.screen{transition:opacity 0.25s;}
</style>
</head>

<div id="cursor">
  <div class="c-ring"></div>
  <div class="c-h"></div>
  <div class="c-v"></div>

  <div class="c-tl"></div>
  <div class="c-tr"></div>
  <div class="c-bl"></div>
  <div class="c-br"></div>
</div>

  <div class="hero">
    <div class="hero-white">Defend Your</div>
    <div class="hero-pink">Weekend</div>
  </div>
  <p class="subtitle">
    Privacy threats are descending toward your weekend.<br>
    <strong>Click to shoot</strong> them before they cross the line.
  </p>
  <button class="btn-pink" id="btn-start"><span>Start</span></button>
</div>

      <div id="timer-val">01:00</div>
    </div>
  </div>

  <!-- HUD Top Right -->
  <div id="hud-top-right">
    <div id="combo-box">
      <div class="hud-label">Combo Streak</div>
      <div id="combo-val">x1</div>
    </div>
    <div id="score-box">

      <div id="score-val">0</div>
    </div>
  </div>

  <!-- HUD Bottom -->

      </svg>
    </div>
  </div>
</div>

<!-- ═══════════════════ END SCREEN ═════════════════════ -->
<div id="screen-end" class="screen">
  <div class="badge" id="end-badge"><span id="end-badge-text">Mission Completed</span></div>
  <div class="hero">
    <div class="hero-white">Weekend</div>
    <div class="hero-pink" id="end-result">Secure</div>
  </div>
  <p id="end-subtitle"></p>
  <div id="end-stats"></div>
  <button class="btn-pink" id="btn-restart"><span id="btn-restart-text">Play Again</span></button>
</div>

// ════════════════════════════════════════════════════════
//  TARGET TYPES
// ════════════════════════════════════════════════════════
const TARGET_TYPES = [
  { key:'pii',         label1:'Unmasked',  label2:'PII',         path:P.pii,         vb:'0 0 72 47.6845',      iw:64, ih:42 },
  { key:'spreadsheet', label1:'Leaky',     label2:'Spreadsheet', path:P.spreadsheet, vb:'0 0 57.8076 56.0557',  iw:56, ih:54 },
  { key:'cookie',      label1:'Tracking',  label2:'Cookie',      path:P.cookie,      vb:'0 0 68.6973 68.6991',  iw:62, ih:62 },

  { key:'error404',    label1:'404',       label2:'Error',       path:P.error404,    vb:'0 0 72.0102 52.6614',  iw:64, ih:46 },

];

// ════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════���═════════
const TARGET_W    = 168;
const TARGET_H    = 180;
const HUD_BOT_H   = 68;
const TOTAL_TIME  = 60;

// ════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════
let state = {
  targets: [], score: 0, combo: 1,
  hearts: 3, timeLeft: TOTAL_TIME,
  running: false, rafId: null,
  spawnTimer: 1.0,
};
let lastTimestamp = 0;

// ════════════════════════════════════════════════════════
//  DOM REFS
// ════════════════════════════════════════════════════════
const cursor      = document.getElementById('cursor');
const gameArea    = document.getElementById('game-area');
const heartsRow   = document.getElementById('hearts-row');
const timerVal    = document.getElementById('timer-val');
const comboBox    = document.getElementById('combo-box');
const comboVal    = document.getElementById('combo-val');
const scoreVal    = document.getElementById('score-val');
const weekendLine = document.getElementById('weekend-line');
const endStats    = document.getElementById('end-stats');

// ════════════════════════════════════════════════════════
//  CURSOR
// ════════════════════════════════════════════════════════
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ════════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ════════════════════════════════════════════════════════
//  HEARTS DISPLAY
// ════════════════════════════════════════════════════════
function renderHearts() {
  heartsRow.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const filled = i < state.hearts;
    const wrap = document.createElement('div');
    wrap.className = 'heart-wrap';
    wrap.id = 'heart-' + i;
    wrap.innerHTML = `<svg class="heart-svg" viewBox="0 0 40 46.6278" fill="none" width="40" height="40">
      <path d="${P.heart}" fill="${filled ? '#F64B7F' : 'rgba(246,75,127,0.2)'}"/>
    </svg>`;
    heartsRow.appendChild(wrap);
  }
}

function shakeHeart(idx) {
  const w = document.getElementById('heart-' + idx);
  if (!w) return;
  w.classList.remove('shake');
  void w.offsetWidth;
  w.classList.add('shake');
}

function updateHearts() {
  for (let i = 0; i < 3; i++) {
    const w = document.getElementById('heart-' + i);
    if (!w) continue;
    const svg = w.querySelector('path');
    svg.setAttribute('fill', i < state.hearts ? '#F64B7F' : 'rgba(246,75,127,0.2)');
  }
}

// ════════════════════════════════════════════════════════
//  HUD UPDATES
// ════════════════════════════════════════════════════════
function updateHUD() {
  // Timer
  const s = Math.ceil(state.timeLeft);
  const mm = String(Math.floor(s / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  timerVal.textContent = mm + ':' + ss;
  timerVal.classList.toggle('danger', state.timeLeft <= 10);

  // Score
  scoreVal.textContent = state.score.toLocaleString();

  // Combo
  if (state.combo > 1) {
    comboBox.style.display = 'block';
    comboVal.textContent = 'x' + state.combo;
  } else {
    comboBox.style.display = 'none';
  }
}

// ════════════════════════════════════════════════════════
//  WEEKEND LINE PULSE
// ════════════════════════════════════════════════════════
function pulseWeekendLine() {
  weekendLine.classList.remove('pulse');
  void weekendLine.offsetWidth;
  weekendLine.classList.add('pulse');
}

// ════════════════════════════════════════════════════════
//  SHOT RIPPLE EFFECT
// ════════════════════════════════════════════════════════
function createShot(x, y) {
  const el = document.createElement('div');
  el.className = 'shot-ring';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ════════════════════════════════════════════════════════
//  SCORE POPUP
// ════════════════════════════════════════════════════════
function createScorePopup(x, y, points, combo) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.style.fontSize = combo >= 3 ? '28px' : '22px';
  el.textContent = '+' + points + (combo >= 2 ? ' x' + combo : '');
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ════════════════════════════════════════════════════════
//  TARGET SPAWNING
// ════════════════════════════════════════════════════════
function getSpeed() {
  const t = state.timeLeft;
  const base = t > 40 ? 0.09 : t > 20 ? 0.13 : 0.18;
  return (base + Math.random() * 0.025) * window.innerHeight;
}
function getSpawnInterval() {
  const t = state.timeLeft;
  return t > 40 ? 2.2 : t > 20 ? 1.7 : 1.2;
}
function getMaxTargets() {
  const t = state.timeLeft;
  return t > 40 ? 3 : t > 20 ? 4 : 6;
}

function spawnTarget() {
  const typeIdx = Math.floor(Math.random() * TARGET_TYPES.length);
  const type = TARGET_TYPES[typeIdx];
  const maxX = Math.max(TARGET_W + 20, window.innerWidth - TARGET_W - 20);
  const x = 20 + Math.random() * (maxX - 20);
  const y = -TARGET_H - 10;

  const el = document.createElement('div');
  el.className = 'target-card';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.innerHTML = `
    <div class="target-inner">
      <div class="target-icon">
        <svg viewBox="${type.vb}" fill="none" width="${type.iw}" height="${type.ih}">
          <path d="${type.path}" fill="#F64B7F"/>
        </svg>
      </div>
      <div class="target-label">${type.label1}${type.label2 ? '<br>' + type.label2 : ''}</div>
      <div class="target-glow"></div>
    </div>`;

  gameArea.appendChild(el);

  const target = { id: Date.now() + Math.random(), x, y, speed: getSpeed(), el, hit: false, missed: false, doneTime: 0 };
  state.targets.push(target);
}

// ════════════════════════════════════════════════════════
//  HIT / MISS
// ════════════════════════════════════════════════════════
function hitTarget(t, mx, my) {
  if (t.hit || t.missed) return;
  t.hit = true;
  t.doneTime = performance.now();
  t.el.classList.add('hit');
  state.combo = Math.min(state.combo + 1, 10);
  const pts = 100 * state.combo;
  state.score += pts;
  createScorePopup(t.x + TARGET_W / 2, t.y, pts, state.combo);
  t.el.addEventListener('animationend', () => { t.el.remove(); }, { once: true });
}

function missTarget(t) {
  if (t.hit || t.missed) return;
  t.missed = true;
  t.doneTime = performance.now();
  t.el.classList.add('missed');
  state.combo = 1;
  state.hearts = Math.max(0, state.hearts - 1);
  updateHearts();
  shakeHeart(state.hearts); // shake the heart that just went empty
  pulseWeekendLine();
  t.el.addEventListener('animationend', () => { t.el.remove(); }, { once: true });
}

// ════════════════════════════════════════════════════════
//  CLICK HANDLER
// ════════════════════════════════════════════════════════
gameArea.addEventListener('click', e => {
  if (!state.running) return;
  const mx = e.clientX, my = e.clientY;
  createShot(mx, my);
  for (const t of state.targets) {
    if (t.hit || t.missed) continue;
    if (mx >= t.x && mx <= t.x + TARGET_W && my >= t.y && my <= t.y + TARGET_H) {
      hitTarget(t, mx, my);
      break;
    }
  }
});

// ════════════════════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════════════════════
function gameLoop(timestamp) {
  if (!state.running) return;

  if (lastTimestamp === 0) {
    lastTimestamp = timestamp;
    state.rafId = requestAnimationFrame(gameLoop);
    return;
  }

  const delta = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
  lastTimestamp = timestamp;

  // Update timer
  state.timeLeft = Math.max(0, state.timeLeft - delta);

  // Move targets & check miss
  const lineY = window.innerHeight - HUD_BOT_H;
  for (const t of state.targets) {
    if (t.hit || t.missed) continue;
    t.y += t.speed * delta;
    t.el.style.top = t.y + 'px';
    if (t.y + TARGET_H * 0.6 >= lineY) {
      missTarget(t);
    }
  }

  // Clean up finished targets
  state.targets = state.targets.filter(t => !(t.hit || t.missed) || document.body.contains(t.el));

  // Spawn
  state.spawnTimer -= delta;
  const active = state.targets.filter(t => !t.hit && !t.missed).length;
  if (state.spawnTimer <= 0 && active < getMaxTargets()) {
    spawnTarget();
    state.spawnTimer = getSpawnInterval();
  }

  // Update HUD
  updateHUD();

  // Check end conditions
  if (state.hearts <= 0) { endGame(false); return; }
  if (state.timeLeft <= 0) { endGame(true); return; }

  state.rafId = requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════════════════
//  START GAME
// ════════════════════════════════════════════════════════
function startGame() {
  // Reset state
  state.targets.forEach(t => t.el.remove());
  state.targets = [];
  state.score = 0;
  state.combo = 1;
  state.hearts = 3;
  state.timeLeft = TOTAL_TIME;
  state.spawnTimer = 1.0;
  state.running = true;
  lastTimestamp = 0;

  // Reset HUD
  renderHearts();
  updateHUD();
  comboBox.style.display = 'none';

  showScreen('screen-play');
  state.rafId = requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════════════════
//  END GAME
// ════════════════════════════════════════════════════════
function endGame(won) {
  state.running = false;
  if (state.rafId) cancelAnimationFrame(state.rafId);

  // Stop targets
  state.targets.forEach(t => {
    if (!t.hit && !t.missed) { t.missed = true; t.el.remove(); }
  });

  setTimeout(() => {
    // Badge
    const badge = document.getElementById('end-badge');
    const badgeText = document.getElementById('end-badge-text');
    badgeText.textContent = won ? 'Mission Completed' : 'Mission Failed';
    // Remove old badge-dot if any
    badge.querySelector('.badge-dot') && badge.querySelector('.badge-dot').remove();
    if (!won) {
      const dot = document.createElement('span');
      dot.className = 'badge-dot';
      badge.prepend(dot);
    }

    // Title
    document.getElementById('end-result').textContent = won ? 'Secure' : 'Destroy';

    // Subtitle
    document.getElementById('end-subtitle').textContent = won
      ? 'All threats neutralized · Privacy integrity maintained'
      : 'Threats overwhelmed the defense perimeter';

    // Stats
    endStats.innerHTML = '';
    if (won) {
      // Score (right-aligned) + divider + hearts
      endStats.innerHTML = `
        <div class="stat-block right">
          <div class="stat-label right">Final Score</div>
          <div class="stat-value right">${state.score.toLocaleString()}</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block" style="padding:8px 18px">
          <div class="stat-label">Hearts Left</div>
          <div id="end-hearts-row" style="display:flex;gap:8px;margin-top:6px">${[0,1,2].map(i=>`
            <div class="end-heart">
              <svg viewBox="0 0 40 46.6278" fill="none" width="48" height="48" style="transform:scaleY(-1)">
                <path d="${P.heart}" fill="${i < state.hearts ? '#F64B7F' : 'rgba(246,75,127,0.2)'}"/>
              </svg>
            </div>`).join('')}
          </div>
        </div>`;
    } else {
      endStats.innerHTML = `
        <div class="stat-block center">
          <div class="stat-label">Final Score</div>
          <div class="stat-value">${state.score.toLocaleString()}</div>
        </div>`;
    }

    // Button
    document.getElementById('btn-restart-text').textContent = won ? 'Play Again' : 'Try Again';
    showScreen('screen-end');
  }, 250);
}

// ════════════════════════════════════════════════════════
//  BUTTON LISTENERS
// ════════════════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', () => showScreen('screen-start'));
</script>
</body>
</html>
